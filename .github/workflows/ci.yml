name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: swift build + test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: swiftlint --strict
        run: swiftlint lint --strict --reporter github-actions-logging

  dead-code:
    name: Periphery
    runs-on: macos-latest
    # Informational until codebase is cleaned up. Track in TODOS.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Periphery
        run: brew install periphery

      - name: periphery scan
        run: periphery scan --strict --format github-actions

  platforms:
    name: xcodebuild ${{ matrix.platform }}
    runs-on: macos-latest
    # tvOS/watchOS are informational until multi-platform cleanup lands.
    continue-on-error: ${{ matrix.platform == 'tvOS' || matrix.platform == 'watchOS' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - iOS
          - macOS
          - tvOS
          - watchOS
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ matrix.platform }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-derived-${{ matrix.platform }}-

      - name: Build for ${{ matrix.platform }}
        run: |
          set -o pipefail
          xcodebuild \
            -scheme MatrixSwiftBaseUI \
            -destination "generic/platform=${{ matrix.platform }}" \
            -skipPackagePluginValidation \
            build | xcbeautify --renderer github-actions
